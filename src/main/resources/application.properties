spring.application.name=obratech
server.port=9999
spring.devtools.livereload.enabled=false

# ── Base de datos (MongoDB) ───────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/obratech

# ── Cache y sesiones (Redis) ─────────────────────────────────────────────────
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.session.store-type=redis

# ── Sesión y cookie ───────────────────────────────────────────────────────────
# Administración de sesiones
server.servlet.session.cookie.name=OBRATECH_SESSION
# evita acceso desde JS
server.servlet.session.cookie.http-only=true
# true en producción (HTTPS)
server.servlet.session.cookie.secure=false
# protección CSRF adicional
server.servlet.session.cookie.same-site=Strict
# 24h cookie en browser
server.servlet.session.cookie.max-age=86400
# 2h inactividad en servidor
server.servlet.session.timeout=2h

# ── Subida de archivos ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# ── Seeder de datos de prueba  ──────────────────
app.seed.enabled=true

# ── Manejo de errores  ─────────────────────
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always

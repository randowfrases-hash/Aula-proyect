<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Calificaciones de contratista</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap"
          rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #FF9800 0%, #FF6B00 100%);
        }
        .contractor-card {
            background: linear-gradient(135deg, #1A1A1A 0%, #242424 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .contractor-card:hover {
            border-color: rgba(255, 152, 0, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF9800",
                        "background-dark": "#121212",
                        "surface-dark": "#1A1A1A",
                        "text-main-dark": "#E0E0E0",
                        "text-secondary-dark": "#A0A0A0",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark font-display text-white">
<!-- Sidebar -->
<div class="fixed left-0 top-0 h-full w-64 bg-surface-dark border-r border-gray-800 z-40">
    <div class="p-6 border-b border-gray-800">
        <div class="flex items-center space-x-3">
            <img alt="ObraTech Logo" class="h-10" src="/img/logo3.png" />
            <span class="text-xl font-bold text-white">ObraTech</span>
        </div>
    </div>
    <nav class="p-4 space-y-2">
        <a th:href="@{/desboard}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
            <span class="material-symbols-outlined text-text-secondary-dark">dashboard</span>
            <span class="text-text-secondary-dark">Dashboard</span>
        </a>
        <a th:href="@{/proyectos/mis-proyectos}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
            <span class="material-symbols-outlined text-text-secondary-dark">folder</span>
            <span class="text-text-secondary-dark">Mis Proyectos</span>
        </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-800">
        <div class="flex items-center space-x-3 mb-3">
            <div class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center">
                <span th:text="${session.usuario.username != null ? session.usuario.username.substring(0,1).toUpperCase() : 'U'}"></span>
            </div>
            <div class="flex-1">
                <p class="text-text-main-dark font-medium text-sm" th:text="${session.usuario.username}">Usuario</p>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" class="w-full">
            <button type="submit" class="w-full flex items-center justify-center space-x-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-colors">
                <span class="material-symbols-outlined">logout</span>
                <span>Cerrar Sesión</span>
            </button>
        </form>
    </div>
</div>

<!-- Main Content -->
<div class="ml-64 min-h-screen">
    <!-- Header -->
    <header class="bg-surface-dark border-b border-gray-800 px-8 py-6">
        <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                <a th:href="@{/desboard}" class="text-text-secondary-dark hover:text-white transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-white">Calificaciones de contratista</h1>
                    <p class="text-text-secondary-dark text-sm mt-1">Lista de contratistas — Ver detalles</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="p-8">
        <div class="max-w-6xl mx-auto">

            <!-- Mensaje si no hay contratistas -->
            <div th:if="${#lists.isEmpty(contratistas)}" class="p-12 text-center bg-surface-dark rounded-lg border border-gray-800">
                <span class="material-symbols-outlined text-6xl text-gray-500 block mb-4">engineering</span>
                <p class="text-text-secondary-dark text-lg">No hay contratistas registrados</p>
            </div>

            <!-- Lista de contratistas -->
            <div th:unless="${#lists.isEmpty(contratistas)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="c : ${contratistas}" class="contractor-card rounded-xl p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-white" th:text="${c.nombre + ' ' + c.apellido}">Nombre</h3>
                            <p class="text-text-secondary-dark text-sm" th:text="${'@' + c.username}">@usuario</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="material-symbols-outlined text-primary">star</span>
                            <span class="text-white font-medium"
                                  th:text="${c.calificacionPromedio != null ? #numbers.formatDecimal(c.calificacionPromedio, 1, 1) : '0.0'}">0.0</span>
                        </div>
                    </div>
                    <p class="text-text-main-dark text-sm mb-4" th:text="${c.especialidad}">Especialidad</p>
                    <div class="flex gap-2">
                        <a th:href="@{/contratistas/{id}(id=${c.id})}"
                           class="flex-1 px-3 py-2 rounded bg-gray-700 hover:bg-gray-600 text-white text-center font-medium transition-colors">
                            Ver Perfil
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
</div>

<!-- Calificar button removed as requested; backend calification logic remains intact -->
<script src="/js/obratech.js"></script>
</body>
</html>

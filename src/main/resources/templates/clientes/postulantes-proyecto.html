<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${proyecto.titulo} + ' - Postulantes'">Postulantes - Proyecto</title>

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: "Work Sans", sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Estilo de las cards (igual al primero) */
        .postulation-card {
            background: linear-gradient(135deg, #1A1A1A 0%, #242424 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .postulation-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 152, 0, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* Badges (igual al primero) */
        .status-pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .status-accepted {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>

<body class="bg-[#121212] text-white min-h-screen px-4 py-6">

    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold" th:text="${proyecto.titulo}">Título del proyecto</h1>
                <p class="text-gray-400" th:text="${proyecto != null ? proyecto.ubicacion : 'N/A'}">Ubicación</p>
            </div>

            <a th:href="@{/proyectos/mis-proyectos}"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition">
                Volver
            </a>
        </div>

        <!-- Contratista asignado -->
        <div th:if="${proyecto.contratistaAsignado != null}" class="p-4 mb-6 rounded-lg postulation-card">

            <p class="font-semibold">
                <span class="material-symbols-outlined text-primary mr-1">person</span>
                Asignado:
                <span class="text-gray-200 ml-2" th:text="${proyecto.contratistaAsignado.username}">contratista</span>
            </p>

            <p class="text-gray-400 text-sm mt-1">
                Este contratista fue seleccionado por la empresa.
            </p>

            <div th:if="${session.usuario != null and session.usuario.username == proyecto.cliente.username}">
                <a th:href="@{/calificaciones/calificar/{proyectoId}/{contratistaId}(proyectoId=${proyecto.id},contratistaId=${proyecto.contratistaAsignado.id})}"
                    class="inline-block mt-3 px-3 py-2 bg-yellow-500 text-black rounded-lg hover:bg-yellow-400 transition">
                    Calificar asignado
                </a>
            </div>
        </div>

        <!-- Título -->
        <h2 class="text-xl font-semibold mb-4">
            Postulantes (<span th:text="${postulaciones.size()}">0</span>)
        </h2>

        <!-- Sin postulaciones -->
        <div th:if="${postulaciones.size() == 0}" class="p-10 text-center rounded-lg postulation-card">
            <span class="material-symbols-outlined text-6xl text-gray-500 mb-4 block">mail</span>
            <p class="text-gray-400">No hay postulaciones todavía.</p>
        </div>

        <!-- Lista de postulaciones -->
        <div th:if="${postulaciones.size() > 0}" class="space-y-4">

            <div th:each="post : ${postulaciones}" class="postulation-card rounded-xl p-6">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                    <!-- Datos del postulante -->
                    <div>
                        <h3 class="text-lg font-bold" th:text="${post.usuario.username}">usuario</h3>
                        <p class="text-gray-400 text-sm mt-1">
                            Mensaje:
                            <span th:text="${post.mensaje} ?: 'Sin mensaje'">Sin mensaje</span>
                        </p>
                        <p class="text-gray-400 text-sm mt-1">
                            Fecha:
                            <span th:text="${#temporals.format(post.fechaPostulacion, 'dd/MM/yyyy HH:mm')}">
                                --/--/----
                            </span>
                        </p>
                        <a th:href="@{/contratistas/por-username/{username}(username=${post.usuario.username})}"
                            class="text-primary font-medium mt-3 inline-block">
                            Ver perfil
                        </a>
                    </div>

                    <!-- Estado -->
                    <div>
                        <p class="text-gray-400 text-sm mb-2">Estado:</p>
                        <span class="px-3 py-1 rounded-full text-sm font-medium" th:classappend="${post.estado == 'PENDING' ? 'status-pending'
                                   : post.estado == 'ACCEPTED' ? 'status-accepted'
                                   : 'status-rejected'}" th:text="${post.estado == 'PENDING' ? 'Pendiente'
                                   : post.estado == 'ACCEPTED' ? 'Aceptado'
                                   : 'Rechazado'}">
                        </span>
                    </div>
                    <!-- Acciones -->
                    <div class="flex flex-col justify-between">

                        <!-- Botones cuando está pendiente -->
                        <div th:if="${post.estado == 'PENDING'}" class="flex flex-col gap-2 w-full">

                            <!-- Botón VER PERFIL -->
                            <a th:href="@{/contratistas/por-username/{username}(username=${post.usuario.username})}"
                                class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg flex justify-center items-center gap-1">
                                <span class="material-symbols-outlined text-sm">visibility</span>
                                Ver perfil
                            </a>

                            <div class="flex gap-2">

                                <!-- Botón ACEPTAR -->
                                                <form
                                                    th:action="@{/postulaciones/{pid}/postulantes/{id}/aceptar(pid=${proyecto.id},id=${post.id})}"
                                                    method="post" class="flex-1">
                                                    <button th:if="${!tieneAceptada}"
                                                        class="w-full px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex justify-center items-center gap-1">
                                                        <span class="material-symbols-outlined text-sm">check</span>
                                                        Aceptar
                                                    </button>
                                                    <button th:unless="${!tieneAceptada}"
                                                        disabled
                                                        class="w-full px-4 py-2 bg-gray-600 text-gray-300 rounded-lg flex justify-center items-center gap-1 cursor-not-allowed">
                                                        <span class="material-symbols-outlined text-sm">check</span>
                                                        Aceptar
                                                    </button>
                                                </form>

                                <!-- Botón RECHAZAR -->
                                <form
                                    th:action="@{/postulaciones/{pid}/postulantes/{id}/rechazar(pid=${proyecto.id},id=${post.id})}"
                                    method="post" class="flex-1">
                                    <button
                                        class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex justify-center items-center gap-1">
                                        <span class="material-symbols-outlined text-sm">close</span>
                                        Rechazar
                                    </button>
                                </form>

                            </div>

                        </div>


                    </div>

                </div>

            </div>
        </div>

    </div>

<script src="/js/obratech.js"></script>
</body>

</html>

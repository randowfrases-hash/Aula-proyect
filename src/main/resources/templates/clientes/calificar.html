<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Calificar Contratista</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #FF9800 0%, #FF6B00 100%);
        }
        .detail-card {
            background: linear-gradient(135deg, #1A1A1A 0%, #242424 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF9800",
                        "background-dark": "#121212",
                        "surface-dark": "#1A1A1A",
                        "text-main-dark": "#E0E0E0",
                        "text-secondary-dark": "#A0A0A0",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark font-display text-white min-h-screen">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-surface-dark border-r border-gray-800 z-40">
        <div class="p-6 border-b border-gray-800">
            <div class="flex items-center space-x-3">
                <img alt="ObraTech Logo" class="h-10" src="/img/logo3.png" />
                <span class="text-xl font-bold text-white">ObraTech</span>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <a th:href="@{/desboard}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
                <span class="material-symbols-outlined text-text-secondary-dark">dashboard</span>
                <span class="text-text-secondary-dark">Dashboard</span>
            </a>
            <a th:href="@{/proyectos/mis-proyectos}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
                <span class="material-symbols-outlined text-text-secondary-dark">folder</span>
                <span class="text-text-secondary-dark">Mis Proyectos</span>
            </a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-800">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center">
                    <span th:text="${session.usuario.username != null ? session.usuario.username.substring(0,1).toUpperCase() : 'U'}"></span>
                </div>
                <div class="flex-1">
                    <p class="text-text-main-dark font-medium text-sm" th:text="${session.usuario.username}">Usuario</p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="w-full">
                <button type="submit" class="w-full flex items-center justify-center space-x-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-colors">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Cerrar Sesión</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 min-h-screen">
        <!-- Header -->
        <header class="bg-surface-dark border-b border-gray-800 px-8 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a th:href="@{/calificaciones/contratistas}" class="text-text-secondary-dark hover:text-white transition-colors">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Calificar Contratista</h1>
                        <p class="text-text-secondary-dark text-sm mt-1" th:text="${contratista.nombre}">Nombre del Contratista</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="p-8">
            <div class="max-w-2xl mx-auto">
                <div class="detail-card rounded-xl p-8">
                <form th:attr="action=${calificacion.id != null} ? @{/calificaciones/{id}/editar(id=${calificacion.id})} : @{/calificaciones/crear/{proyectoId}/{personaId}(proyectoId=${proyecto.id},personaId=${contratista.id})}" method="post">
                        <div>
                            <label class="block text-text-main-dark font-medium mb-2">Puntuación (1-5)</label>
                            <select name="puntuacion" class="w-full bg-gray-900 text-white p-3 rounded-lg border border-gray-700 focus:border-primary outline-none">
                                <option value="5" th:selected="${calificacion.puntuacion == 5}">5 - Excelente</option>
                                <option value="4" th:selected="${calificacion.puntuacion == 4}">4 - Muy bueno</option>
                                <option value="3" th:selected="${calificacion.puntuacion == 3}">3 - Bueno</option>
                                <option value="2" th:selected="${calificacion.puntuacion == 2}">2 - Regular</option>
                                <option value="1" th:selected="${calificacion.puntuacion == 1}">1 - Malo</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-text-main-dark font-medium mb-2">Comentario</label>
                            <textarea name="comentario" rows="4" class="w-full bg-gray-900 text-white p-3 rounded-lg border border-gray-700 focus:border-primary outline-none" placeholder="Escribe un comentario opcional..." th:text="${calificacion.comentario}"></textarea>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit" class="flex-1 gradient-bg text-white font-semibold py-3 rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center space-x-2">
                                <span class="material-symbols-outlined">check</span>
                                <span>Enviar Calificación</span>
                            </button>
                            <a th:href="@{/calificaciones/contratistas}" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center space-x-2">
                                <span class="material-symbols-outlined">close</span>
                                <span>Cancelar</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
<script src="/js/obratech.js"></script>
</body>
</html>

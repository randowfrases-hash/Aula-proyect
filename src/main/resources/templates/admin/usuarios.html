<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuarios — ObraTech Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF9900", "background-dark": "#121212",
                        "surface-dark": "#1A1A1A", "surface-2": "#242424",
                        "text-main-dark": "#E0E0E0", "text-secondary-dark": "#A0A0A0",
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark font-display text-text-main-dark min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-10">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Gestión de Usuarios</h1>
                <p class="text-text-secondary-dark text-sm mt-1">
                    Administra roles, accesos y estado de todas las cuentas.
                </p>
            </div>
            <a href="/admin/desboard"
               class="flex items-center gap-2 bg-surface-dark border border-white/10 text-text-main-dark
                      px-4 py-2 rounded-xl text-sm hover:bg-white/10 transition-all">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Volver al Panel
            </a>
        </div>

        <!-- Flash de éxito -->
        <div th:if="${mensajeExito}"
             data-auto-dismiss="4000"
             class="flex items-center gap-3 bg-green-500/15 border border-green-500/40 text-green-400
                    px-5 py-3 rounded-xl text-sm mb-6">
            <span class="material-symbols-outlined text-base shrink-0">check_circle</span>
            <span th:text="${mensajeExito}"></span>
        </div>

        <!-- Buscador JS -->
        <div class="flex items-stretch gap-3 mb-6">
            <div class="flex flex-1 items-center gap-2 bg-surface-dark border border-white/10 rounded-xl px-4 py-2.5
                        focus-within:border-primary/50 transition-all">
                <span class="material-symbols-outlined text-text-secondary-dark text-xl">search</span>
                <input id="buscador" type="text" placeholder="Buscar por correo o rol..."
                       class="flex-1 bg-transparent text-text-main-dark placeholder:text-text-secondary-dark
                              text-sm outline-none"
                       oninput="filtrarUsuarios(this.value)" />
            </div>
        </div>

        <!-- Tabla -->
        <div class="bg-surface-dark border border-white/10 rounded-2xl overflow-hidden shadow-xl">
            <table class="w-full text-sm" id="tabla-usuarios">
                <thead>
                    <tr class="border-b border-white/10 text-text-secondary-dark text-xs uppercase tracking-wide">
                        <th class="text-left px-6 py-4">Correo</th>
                        <th class="text-left px-6 py-4">Rol</th>
                        <th class="text-left px-6 py-4">Estado</th>
                        <th class="text-left px-6 py-4">Creado</th>
                        <th class="text-left px-6 py-4">Último Acceso</th>
                        <th class="text-left px-6 py-4">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-usuarios">
                    <tr th:each="u : ${usuarios}"
                        class="border-b border-white/5 hover:bg-white/5 transition-colors usuario-row"
                        th:attr="data-search=${u.username + ' ' + u.role}">

                        <!-- Correo -->
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center shrink-0">
                                    <span class="material-symbols-outlined text-primary text-base">person</span>
                                </div>
                                <span class="font-medium text-text-main-dark" th:text="${u.username}"></span>
                            </div>
                        </td>

                        <!-- Rol -->
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 rounded-full text-xs font-semibold"
                                  th:classappend="${u.role == 'ROLE_ADMIN'} ? 'bg-purple-500/20 text-purple-300' :
                                                  (${u.role == 'ROLE_CLIENT'} ? 'bg-blue-500/20 text-blue-300' :
                                                  (${u.role == 'ROLE_CONTRACTOR'} ? 'bg-orange-500/20 text-orange-300' :
                                                   'bg-gray-500/20 text-gray-300'))"
                                  th:text="${u.role}"></span>
                        </td>

                        <!-- Estado -->
                        <td class="px-6 py-4">
                            <span th:if="${u.activo}"
                                  class="inline-flex items-center gap-1 px-2.5 py-1 bg-green-500/20 text-green-400
                                         rounded-full text-xs font-semibold">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>
                                Activo
                            </span>
                            <span th:unless="${u.activo}"
                                  class="inline-flex items-center gap-1 px-2.5 py-1 bg-red-500/20 text-red-400
                                         rounded-full text-xs font-semibold">
                                <span class="w-1.5 h-1.5 rounded-full bg-red-400 inline-block"></span>
                                Inactivo
                            </span>
                        </td>

                        <!-- Creado -->
                        <td class="px-6 py-4 text-text-secondary-dark">
                            <span th:if="${u.creado}" th:text="${#temporals.format(u.creado, 'dd/MM/yyyy')}"></span>
                            <span th:unless="${u.creado}" class="text-white/30">—</span>
                        </td>

                        <!-- Último acceso -->
                        <td class="px-6 py-4 text-text-secondary-dark">
                            <span th:if="${u.ultimoAcceso}" th:text="${#temporals.format(u.ultimoAcceso, 'dd/MM/yyyy HH:mm')}"></span>
                            <span th:unless="${u.ultimoAcceso}" class="text-white/30">Nunca</span>
                        </td>

                        <!-- Acciones -->
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <!-- Activar / Desactivar -->
                                <form th:action="@{/admin/usuarios/{id}/toggle-activo(id=${u.id})}" method="post">
                                    <button type="submit"
                                            th:title="${u.activo} ? 'Desactivar cuenta' : 'Activar cuenta'"
                                            th:class="${u.activo} ?
                                                'flex items-center justify-center w-8 h-8 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-all' :
                                                'flex items-center justify-center w-8 h-8 rounded-lg bg-green-500/20 text-green-400 hover:bg-green-500/30 transition-all'"
                                            data-confirm="¿Confirmas cambiar el estado de esta cuenta?">
                                        <span class="material-symbols-outlined text-base"
                                              th:text="${u.activo} ? 'block' : 'check_circle'"></span>
                                    </button>
                                </form>

                                <!-- Eliminar -->
                                <form th:action="@{/admin/usuarios/{id}/eliminar(id=${u.id})}" method="post">
                                    <button type="submit"
                                            class="flex items-center justify-center w-8 h-8 rounded-lg
                                                   bg-gray-500/20 text-text-secondary-dark hover:bg-red-500/20
                                                   hover:text-red-400 transition-all"
                                            title="Eliminar usuario"
                                            data-confirm="¿Estás seguro de eliminar este usuario? Esta acción no se puede deshacer.">
                                        <span class="material-symbols-outlined text-base">delete</span>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Estado vacío -->
            <div th:if="${#lists.isEmpty(usuarios)}"
                 class="flex flex-col items-center justify-center py-20 text-text-secondary-dark">
                <span class="material-symbols-outlined text-5xl mb-3">group_off</span>
                <p class="text-sm">No hay usuarios registrados.</p>
            </div>
        </div>

        <!-- Contador -->
        <p class="text-text-secondary-dark text-xs mt-4 text-right">
            Total: <span th:text="${#lists.size(usuarios)}">0</span> usuario(s)
        </p>
    </div>

    <script src="/js/obratech.js"></script>
    <script>
        function filtrarUsuarios(q) {
            const rows = document.querySelectorAll('.usuario-row');
            const term = q.toLowerCase();
            rows.forEach(function(row) {
                const data = (row.dataset.search || '').toLowerCase();
                row.style.display = data.includes(term) ? '' : 'none';
            });
        }
    </script>
</body>
</html>

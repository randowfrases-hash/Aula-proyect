<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="'Error ' + (${codigoError} != null ? ${codigoError} : '') + ' — ObraTech'">Error — ObraTech</title>
    <meta name="description" content="Página de error de ObraTech" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":          "#FF9900",
                        "background-dark":  "#121212",
                        "surface-dark":     "#1A1A1A",
                        "surface-2":        "#242424",
                        "text-main-dark":   "#E0E0E0",
                        "text-secondary-dark": "#A0A0A0",
                        "error-red":        "#FF4C4C",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-12px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out both; }
        .fade-in-delay { animation: fadeIn 0.6s ease-out 0.2s both; }
        .fade-in-delay-2 { animation: fadeIn 0.6s ease-out 0.4s both; }
    </style>
</head>

<body class="bg-background-dark font-display text-text-main-dark min-h-screen flex items-center justify-center p-6">

    <!-- Fondo decorativo -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary/3 rounded-full blur-2xl"></div>
    </div>

    <div class="relative max-w-lg w-full text-center space-y-8">

        <!-- Tarjeta principal -->
        <div class="bg-surface-dark border border-white/10 rounded-2xl p-10 shadow-2xl fade-in">

            <!-- Icono animado -->
            <div class="float-anim inline-flex items-center justify-center w-24 h-24 rounded-2xl mb-6"
                 th:classappend="${codigoError == 403} ? 'bg-red-500/15' : (${codigoError == 404} ? 'bg-amber-500/15' : 'bg-primary/15')">
                <!-- Icono dinámico según tipo de error -->
                <span class="material-symbols-outlined text-6xl"
                      th:classappend="${codigoError == 403} ? 'text-red-400' : (${codigoError == 404} ? 'text-amber-400' : 'text-primary')"
                      th:text="${errorIcon != null ? errorIcon : 'warning'}">
                    warning
                </span>
            </div>

            <!-- Código de error -->
            <div class="fade-in-delay">
                <span th:if="${codigoError != null}"
                      class="inline-block text-7xl font-bold tracking-tighter mb-2"
                      th:classappend="${codigoError == 403} ? 'text-red-400' : (${codigoError == 404} ? 'text-amber-400' : 'text-primary')"
                      th:text="${codigoError}">
                    500
                </span>
            </div>

            <!-- Título -->
            <h1 class="text-2xl font-bold text-text-main-dark mb-3 fade-in-delay"
                th:text="${errorTitle != null ? errorTitle : 'Algo salió mal'}">
                Error
            </h1>

            <!-- Descripción -->
            <p class="text-text-secondary-dark text-base leading-relaxed fade-in-delay-2"
               th:text="${errorMessage != null ? errorMessage : 'El servidor encontró un error procesando tu solicitud.'}">
            </p>
        </div>

        <!-- Acciones -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center fade-in-delay-2">

            <!-- Botón principal: volver al inicio o dashboard -->
            <a href="/desboard"
               class="inline-flex items-center justify-center gap-2 bg-primary text-background-dark font-bold px-6 py-3 rounded-xl hover:bg-primary/90 active:scale-95 transition-all duration-200">
                <span class="material-symbols-outlined text-lg">home</span>
                Ir al Dashboard
            </a>

            <!-- Botón secundario: volver atrás -->
            <button onclick="history.back()"
                    class="inline-flex items-center justify-center gap-2 bg-surface-2 text-text-main-dark font-medium px-6 py-3 rounded-xl hover:bg-white/10 active:scale-95 transition-all duration-200 border border-white/10">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Volver Atrás
            </button>
        </div>

        <!-- Enlace de soporte -->
        <p class="text-text-secondary-dark text-sm fade-in-delay-2">
            ¿Necesitas ayuda?
            <a href="/" class="text-primary hover:underline hover:text-primary/80 transition-colors ml-1">
                Ir a la página principal
            </a>
        </p>

    </div>
<script src="/js/obratech.js"></script>
</body>

</html>

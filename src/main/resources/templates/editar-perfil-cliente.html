<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Cliente | ObraTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #FF9800 0%, #FF6B00 100%);
        }
        .profile-card {
            background: linear-gradient(135deg, #1A1A1A 0%, #242424 100%);
            border: 1px solid rgba(255, 152, 0, 0.2);
            transition: all 0.3s ease;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF9800",
                        "background-dark": "#121212",
                        "surface-dark": "#1A1A1A",
                        "text-main-dark": "#E0E0E0",
                        "text-secondary-dark": "#A0A0A0",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark font-display text-white">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-surface-dark border-r border-gray-800 z-40">
        <div class="p-6 border-b border-gray-800">
            <div class="flex items-center space-x-3">
                <img alt="ObraTech Logo" class="h-10" src="/img/logo3.png" />
                <span class="text-xl font-bold text-white">ObraTech</span>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <a th:href="@{/desboard}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
                <span class="material-symbols-outlined text-text-secondary-dark">dashboard</span>
                <span class="text-text-secondary-dark">Dashboard</span>
            </a>
            <a th:href="@{/proyectos/mis-proyectos}" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors">
                <span class="material-symbols-outlined text-text-secondary-dark">folder</span>
                <span class="text-text-secondary-dark">Mis Proyectos</span>
            </a>
            <a th:href="@{/perfil-cliente}" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-primary/20 border-l-3 border-primary">
                <span class="material-symbols-outlined text-primary">person</span>
                <span class="text-primary font-medium">Mi Perfil</span>
            </a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-800">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center">
                    <span th:text="${session.usuario.username != null ? session.usuario.username.substring(0,1).toUpperCase() : 'U'}"></span>
                </div>
                <div class="flex-1">
                    <p class="text-text-main-dark font-medium text-sm" th:text="${session.usuario.username}">Usuario</p>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="w-full">
                <button type="submit" class="w-full flex items-center justify-center space-x-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-colors">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Cerrar Sesión</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 min-h-screen">
        <!-- Header -->
        <header class="bg-surface-dark border-b border-gray-800 px-8 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a th:href="@{/perfil-cliente}" class="text-text-secondary-dark hover:text-white transition-colors">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Editar Perfil</h1>
                        <p class="text-text-secondary-dark text-sm mt-1">Actualiza tu información personal y de contacto</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="p-8">
            <div class="max-w-2xl mx-auto">
                <div class="profile-card rounded-2xl p-8 mb-8">
                    <h3 class="text-xl font-bold text-white mb-6 flex items-center space-x-2">
                        <span class="material-symbols-outlined text-primary">edit_note</span>
                        <span>Datos del Cliente</span>
                    </h3>
                    
                    <form th:action="@{/perfil-cliente/editar}" method="post" class="space-y-6">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-text-secondary-dark text-sm font-medium mb-2">Nombre</label>
                                <input type="text" name="nombre" th:value="${cliente != null ? cliente.nombre : ''}" 
                                       class="w-full bg-surface-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors"
                                       placeholder="Ingresa tu nombre">
                            </div>
                            <div>
                                <label class="block text-text-secondary-dark text-sm font-medium mb-2">Apellido</label>
                                <input type="text" name="apellido" th:value="${cliente != null ? cliente.apellido : ''}" 
                                       class="w-full bg-surface-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors"
                                       placeholder="Ingresa tu apellido">
                            </div>
                        </div>

                        <div>
                            <label class="block text-text-secondary-dark text-sm font-medium mb-2">Empresa (Opcional)</label>
                            <input type="text" name="empresa" th:value="${cliente != null ? cliente.empresa : ''}" 
                                   class="w-full bg-surface-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors"
                                   placeholder="Nombre de tu empresa">
                        </div>

                        <div>
                            <label class="block text-text-secondary-dark text-sm font-medium mb-2">Teléfono de Contacto</label>
                            <input type="tel" name="telefono" th:value="${cliente != null ? cliente.telefono : ''}" 
                                   class="w-full bg-surface-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors"
                                   placeholder="Ej. 3001234567">
                        </div>

                        <div class="flex flex-col md:flex-row gap-4 pt-4 border-t border-gray-700">
                            <button type="submit" class="flex-1 gradient-bg hover:opacity-90 px-6 py-3 rounded-lg text-white font-semibold transition-all flex items-center justify-center space-x-2">
                                <span class="material-symbols-outlined">save</span>
                                <span>Guardar Cambios</span>
                            </button>
                            <a th:href="@{/perfil-cliente}" class="flex-1 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-lg text-white font-semibold transition-colors flex items-center justify-center space-x-2">
                                <span>Cancelar</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
<script src="/js/obratech.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta — ObraTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":             "#FF9900",
                        "background-dark":     "#121212",
                        "surface-dark":        "#1A1A1A",
                        "surface-2":           "#242424",
                        "text-main-dark":      "#E0E0E0",
                        "text-secondary-dark": "#A0A0A0",
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        input:-webkit-autofill, input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1A1A1A inset !important;
            -webkit-text-fill-color: #E0E0E0 !important;
        }
        select option { background: #1A1A1A; color: #E0E0E0; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn .5s ease-out both; }
    </style>
</head>

<body class="bg-background-dark font-display min-h-screen flex items-center justify-center p-4">

    <!-- Fondo decorativo -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md space-y-6 fade-in py-8">

        <!-- Logo -->
        <div class="flex justify-center">
            <a href="/">
                <div class="flex items-center justify-center w-20 h-20 bg-primary rounded-2xl shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined text-background-dark text-5xl">construction</span>
                </div>
            </a>
        </div>

        <!-- Título -->
        <div class="text-center">
            <h1 class="text-2xl font-bold text-text-main-dark">Crea tu cuenta</h1>
            <p class="text-text-secondary-dark text-sm mt-1">Únete a ObraTech y conecta proyectos con personas</p>
        </div>

        <!-- Mensaje del servidor -->
        <div th:if="${mensaje}" class="px-1">
            <div class="flex items-start gap-3 bg-red-500/15 border border-red-500/40 text-red-400 px-4 py-3 rounded-xl text-sm">
                <span class="material-symbols-outlined text-base mt-0.5 shrink-0">error</span>
                <span th:text="${mensaje}"></span>
            </div>
        </div>
        <div th:if="${exito}" class="px-1">
            <div data-auto-dismiss="5000"
                 class="flex items-start gap-3 bg-green-500/15 border border-green-500/40 text-green-400 px-4 py-3 rounded-xl text-sm">
                <span class="material-symbols-outlined text-base mt-0.5 shrink-0">check_circle</span>
                <span th:text="${exito}"></span>
            </div>
        </div>

        <!-- Error de validación JS -->
        <div id="registro-error"
             class="hidden flex items-center gap-2 bg-red-500/15 border border-red-500/40 text-red-400 px-4 py-3 rounded-xl text-sm mx-1">
        </div>

        <!-- Tarjeta formulario -->
        <div class="bg-surface-dark border border-white/10 rounded-2xl p-8 shadow-2xl">
            <form id="registro-form" th:action="@{/registro}" method="post" class="space-y-5" novalidate>

                <!-- Correo -->
                <div>
                    <label class="block text-text-main-dark text-sm font-medium mb-2">Correo Electrónico</label>
                    <div class="flex items-stretch rounded-xl overflow-hidden bg-surface-2 border border-white/10
                                focus-within:border-primary/60 focus-within:ring-1 focus-within:ring-primary/40 transition-all">
                        <span class="flex items-center pl-4 text-text-secondary-dark">
                            <span class="material-symbols-outlined text-xl">mail</span>
                        </span>
                        <input type="email" name="username" id="reg-username"
                               class="flex-1 bg-transparent text-text-main-dark placeholder:text-text-secondary-dark
                                      px-3 py-3.5 text-sm outline-none"
                               placeholder="ejemplo@email.com"
                               autocomplete="email" required />
                    </div>
                </div>

                <!-- Contraseña -->
                <div>
                    <label class="block text-text-main-dark text-sm font-medium mb-2">Contraseña</label>
                    <div class="password-wrapper flex items-stretch rounded-xl overflow-hidden bg-surface-2 border border-white/10
                                focus-within:border-primary/60 focus-within:ring-1 focus-within:ring-primary/40 transition-all">
                        <span class="flex items-center pl-4 text-text-secondary-dark">
                            <span class="material-symbols-outlined text-xl">lock</span>
                        </span>
                        <input type="password" name="password" id="reg-password"
                               class="flex-1 bg-transparent text-text-main-dark placeholder:text-text-secondary-dark
                                      px-3 py-3.5 text-sm outline-none"
                               placeholder="Mínimo 8 caracteres"
                               autocomplete="new-password" required />
                        <button type="button" onclick="togglePasswordVisibility(this)"
                                aria-label="Mostrar/Ocultar contraseña"
                                class="flex items-center pr-4 text-text-secondary-dark hover:text-text-main-dark transition-colors">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </button>
                    </div>
                    <!-- Barra de fortaleza -->
                    <div class="mt-2 h-1.5 bg-surface-2 rounded-full overflow-hidden">
                        <div id="password-strength-bar" class="h-full w-0 rounded-full transition-all duration-300 bg-gray-600"></div>
                    </div>
                    <p id="password-strength-text" class="text-xs text-text-secondary-dark mt-1 h-4"></p>
                </div>

                <!-- Tipo de usuario -->
                <div>
                    <label class="block text-text-main-dark text-sm font-medium mb-2">Soy un...</label>
                    <div class="relative">
                        <select name="role"
                                class="w-full bg-surface-2 border border-white/10 text-text-main-dark
                                       rounded-xl px-4 py-3.5 text-sm outline-none appearance-none
                                       focus:border-primary/60 focus:ring-1 focus:ring-primary/40 transition-all cursor-pointer">
                            <option value="none" class="text-text-secondary-dark">Selecciona tu rol</option>
                            <option value="contratista">️ Contratista — Gestiono equipos y proyectos</option>
                            <option value="cliente"> Cliente — Publico y contrato proyectos</option>
                            <option value="trabajador"> Trabajador — Busco oportunidades laborales</option>
                        </select>
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary-dark pointer-events-none">
                            <span class="material-symbols-outlined text-xl">expand_more</span>
                        </span>
                    </div>
                </div>

                <!-- Términos -->
                <label class="flex items-start gap-2 cursor-pointer">
                    <input type="checkbox" id="acepta-terminos" required
                           class="mt-0.5 w-4 h-4 rounded border-white/20 bg-surface-2 accent-primary shrink-0" />
                    <span class="text-text-secondary-dark text-sm leading-relaxed">
                        Acepto los
                        <a href="#" class="text-primary hover:underline">Términos y Condiciones</a>
                        y la
                        <a href="#" class="text-primary hover:underline">Política de Privacidad</a>
                    </span>
                </label>

                <!-- Botones -->
                <div class="flex gap-3 pt-1">
                    <button type="submit"
                            class="flex-1 bg-primary text-background-dark font-bold py-3.5 rounded-xl
                                   text-sm uppercase tracking-wide hover:bg-primary/90 active:scale-95
                                   transition-all duration-200">
                        Crear Cuenta
                    </button>
                    <button type="button" onclick="window.location.href='/index'"
                            class="flex-1 bg-surface-2 text-text-main-dark font-medium py-3.5 rounded-xl
                                   text-sm border border-white/10 hover:bg-white/10 active:scale-95
                                   transition-all duration-200">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-text-secondary-dark text-sm pb-4">
            ¿Ya tienes cuenta?
            <a href="/login" class="text-primary font-semibold hover:underline ml-1">Inicia sesión</a>
        </p>
    </div>

    <script src="/js/obratech.js"></script>
    <script>
        // Validar checkbox de términos al enviar
        document.getElementById('registro-form').addEventListener('submit', function(e) {
            const check = document.getElementById('acepta-terminos');
            if (!check.checked) {
                e.preventDefault();
                const err = document.getElementById('registro-error');
                err.textContent = 'Debes aceptar los Términos y Condiciones para continuar.';
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
